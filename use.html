<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご褒美使用 - My Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="p-4">
        <h2 class="text-2xl font-black mb-4 text-orange-900 border-b-2 border-orange-300 pb-2">もちもの</h2>
        
        <div id="owned-list" class="space-y-4">
            <p class="text-center text-orange-700 py-10">読み込み中...</p>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, setupAuthGuard, db, appId, currentUser, showPopup } from './common.js';
        import { collection, query, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        initCommonUI('use');
        let allTickets = [];

        setupAuthGuard((user) => {
            const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'tickets'));
            onSnapshot(q, (snapshot) => {
                allTickets = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderOwnedTickets();
            }, (err) => console.error(err));
        });

        function renderOwnedTickets() {
            const listContainer = document.getElementById('owned-list');
            listContainer.innerHTML = '';
            
            const ownedTickets = allTickets.filter(t => t.ownedCount && t.ownedCount > 0);

            if (ownedTickets.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-orange-700 py-10 bg-orange-100 rounded-lg border-2 border-orange-200 border-dashed">持っているチケットはありません。</p>`;
                return;
            }

            ownedTickets.forEach(ticket => {
                const card = document.createElement('div');
                card.id = `ticket-card-${ticket.id}`;
                card.className = `rpg-panel p-5 flex justify-between items-center transition-all duration-300`;
                
                card.innerHTML = `
                    <div class="flex-1 mr-4">
                        <div class="flex items-center">
                            <svg class="w-6 h-6 text-yellow-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
                            <h3 class="font-bold text-xl text-orange-900 ticket-name">${ticket.name}</h3>
                        </div>
                    </div>
                    <div class="flex flex-col items-center ml-4">
                        <button class="rpg-button px-6 py-2 text-md use-btn" data-id="${ticket.id}">
                            使う
                        </button>
                        <span class="text-sm text-orange-800 font-bold mt-2">所持数: ${ticket.ownedCount}</span>
                    </div>
                `;
                listContainer.appendChild(card);
            });

            // 使うボタンのイベント
            document.querySelectorAll('.use-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if(!currentUser) return;
                    const id = e.target.dataset.id;
                    e.target.disabled = true;
                    
                    const card = document.getElementById(`ticket-card-${id}`);
                    
                    try {
                        const ticketRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tickets', id);
                        const ticketSnap = await getDoc(ticketRef);
                        const currentOwned = ticketSnap.exists() ? (ticketSnap.data().ownedCount || 0) : 0;
                        
                        if (currentOwned > 0) {
                            // アニメーション実行
                            card.classList.add('ticket-break');
                            
                            setTimeout(async () => {
                                await updateDoc(ticketRef, {
                                    ownedCount: currentOwned - 1
                                });
                                showPopup('使用しました！');
                            }, 600); // アニメーション終了後にDB更新とポップアップ
                        }
                    } catch (error) {
                        console.error(error);
                        e.target.disabled = false;
                    }
                });
            });
        }
    </script>
</body>
</html>
