<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ご褒美チケットの追加 - My Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="p-4">
        <h2 class="text-xl font-black mb-4 text-orange-900 border-b-2 border-orange-300 pb-2">チケットの追加</h2>
        
        <form id="add-form" class="rpg-panel p-6 space-y-4">
            <div>
                <label class="block font-bold text-orange-900 mb-1">チケットの名前・内容</label>
                <input type="text" id="t-name" class="w-full p-2 border-2 border-orange-800 rounded" required>
            </div>
            <div>
                <label class="block font-bold text-orange-900 mb-1">属性</label>
                <select id="t-type" class="w-full p-2 border-2 border-orange-800 rounded" required>
                    <option value="daily">デイリー</option>
                    <option value="monday">月曜日</option>
                    <option value="tuesday">火曜日</option>
                    <option value="wednesday">水曜日</option>
                    <option value="thursday">木曜日</option>
                    <option value="friday">金曜日</option>
                    <option value="saturday">土曜日</option>
                    <option value="sunday">日曜日</option>
                    <option value="weekly">ウィークリー</option>
                    <option value="monthly">マンスリー</option>
                </select>
            </div>
            <div>
                <label class="block font-bold text-orange-900 mb-1">必要なコイン枚数</label>
                <input type="number" id="t-cost" min="1" value="50" class="w-full p-2 border-2 border-orange-800 rounded" required>
            </div>
            
            <button type="submit" class="rpg-button w-full py-3 mt-4 text-lg">追加する</button>
            <a href="settings.html" class="block text-center mt-4 text-orange-800 underline">設定画面に戻る</a>
        </form>
    </main>

    <script type="module">
        import { initCommonUI, setupAuthGuard, db, appId, currentUser, showPopup } from './common.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        initCommonUI('settings-sub');
        setupAuthGuard();

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentUser) return;

            const name = document.getElementById('t-name').value;
            const type = document.getElementById('t-type').value;
            const cost = parseInt(document.getElementById('t-cost').value);

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tickets'), {
                    name, type, cost, ownedCount: 0, lastExchangedAt: null
                });

                document.getElementById('add-form').reset();
                
                const buttonsHtml = `
                    <button class="rpg-button bg-gray-500 border-gray-700 shadow-gray-700 px-4 py-2" onclick="window.location.href='settings.html'">閉じる</button>
                    <button class="rpg-button px-4 py-2" onclick="this.closest('.popup-overlay').remove()">続けて追加</button>
                `;
                showPopup('追加しました', false, buttonsHtml);

            } catch (error) {
                console.error(error);
                showPopup('追加に失敗しました');
            }
        });
    </script>
</body>
</html>
