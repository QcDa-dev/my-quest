<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>その他 - My Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="p-4">
        <h2 class="text-xl font-black mb-4 text-orange-900 border-b-2 border-orange-300 pb-2">その他の設定</h2>
        
        <a href="settings.html" class="inline-block mb-4 text-orange-800 underline">&lt; 設定に戻る</a>

        <div class="rpg-panel p-6 space-y-6">
            <h3 class="font-bold text-lg text-orange-900 border-b border-orange-300 pb-1">システム設定</h3>
            
            <div id="week-start-container">
                <label class="block font-bold text-orange-900 mb-2">週の始まり</label>
                <select id="week-start" class="w-full p-2 border-2 border-orange-800 rounded mb-4">
                    <option value="monday">月曜始まり</option>
                    <option value="sunday">日曜始まり</option>
                </select>
                <button id="save-week-start" class="rpg-button w-full py-2">変更を保存する</button>
            </div>

            <div class="border-t-2 border-orange-300 pt-6 mt-6">
                <button id="logout-btn" class="rpg-button w-full py-2 bg-gray-600 border-gray-800 shadow-gray-800">ログアウト</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, setupAuthGuard, db, appId, currentUser, showPopup, auth } from './common.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        initCommonUI('settings-sub');
        
        setupAuthGuard(async (user) => {
            const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
            const snap = await getDoc(profileRef);
            if(snap.exists() && snap.data().weekStart){
                document.getElementById('week-start').value = snap.data().weekStart;
            }
        });

        document.getElementById('save-week-start').addEventListener('click', async () => {
            if(!currentUser) return;
            const weekStart = document.getElementById('week-start').value;
            try {
                const profileRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'info');
                await updateDoc(profileRef, { weekStart });
                showPopup('変更しました');
            } catch (error) {
                console.error(error);
                showPopup('保存に失敗しました');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            if(confirm('ログアウトしますか？')){
                await signOut(auth);
            }
        });
    </script>
</body>
</html>
