<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リリースノート - My Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <header class="bg-orange-600 text-white p-4 text-center shadow-md">
        <h1 class="text-xl font-black">リリースノート</h1>
    </header>

    <main class="p-6 max-w-2xl mx-auto space-y-6">
        
        <!-- 仮のリリース情報 -->
        <div class="rpg-panel p-6">
            <div class="flex justify-between items-center border-b-2 border-orange-300 pb-2 mb-4">
                <h2 class="text-xl font-bold text-orange-900">v1.0.0 正式リリース</h2>
                <span class="text-sm text-orange-700 font-bold">2025/10/01</span>
            </div>
            <ul class="list-disc list-inside text-orange-800 space-y-2">
                <li>My Questの基本機能を公開しました。</li>
                <li>デイリー・曜日・ウィークリー・マンスリーのクエスト分類に対応。</li>
                <li>ご褒美チケットの交換・使用アニメーションを実装。</li>
                <li>週の始まり（月曜/日曜）の設定機能を実装。</li>
            </ul>
        </div>
        
    </main>

    <footer class="text-center p-4 text-xs text-orange-800">
        &copy; 2025 QcDa Project. All Rights Reserved.
    </footer>
</body>
</html>
